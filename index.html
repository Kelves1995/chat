<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Kell_negão · Criativo & Picante</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --whatsapp-green: #25D366;
            --whatsapp-dark-green: #075E54;
            --whatsapp-bubble-user: #005C4B;
            --whatsapp-bubble-bot: #202C33;
            --whatsapp-bg-dark: #111B21;
            --whatsapp-text-primary: #E1E9F1;
            --whatsapp-text-secondary: #8696A0;
            --whatsapp-input-bg: #2A3942;
            --whatsapp-divider: #222E35;
        }

        body {
            background: #0B141A;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 780px;
            background: var(--whatsapp-bg-dark);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            position: relative;
        }

        .chat-header {
            background: var(--whatsapp-dark-green);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--whatsapp-divider);
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .header-info h2 {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-info p {
            color: var(--whatsapp-text-secondary);
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeSlideUp 0.2s ease;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: var(--whatsapp-bubble-user);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: var(--whatsapp-bubble-bot);
            color: var(--whatsapp-text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
            margin-bottom: 8px;
            align-self: flex-start;
            max-width: 90%;
        }

        .choice-btn {
            background: var(--whatsapp-input-bg);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--whatsapp-text-primary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .choice-btn:hover {
            background: var(--whatsapp-green);
            color: #111;
        }

        .typing-indicator {
            background: var(--whatsapp-bubble-bot);
            color: var(--whatsapp-text-secondary);
            align-self: flex-start;
            padding: 8px 16px;
            border-radius: 18px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: #8696a0;
            border-radius: 50%;
            display: inline-block;
            animation: typingWave 1.2s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingWave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .input-area {
            background: #1E2A32;
            padding: 10px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid var(--whatsapp-divider);
        }

        .input-area input {
            flex: 1;
            background: var(--whatsapp-input-bg);
            border: none;
            padding: 12px 18px;
            border-radius: 25px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .input-area input::placeholder {
            color: var(--whatsapp-text-secondary);
        }

        .send-btn {
            background: var(--whatsapp-green);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            color: white;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            background: #ff3b6f;
            margin-left: 8px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }
    </style>
</head>

    function getUniqueResponse(responsesArray, lastResponses, key) {
        let available = responsesArray.filter(r => !lastResponses.includes(r));
        if (available.length === 0) available = responsesArray; // se todas já foram usadas, recicla
        const chosen = available[Math.floor(Math.random() * available.length)];
        // atualiza memória
        userProfile.ultimasRespostas.push(chosen);
        if (userProfile.ultimasRespostas.length > 5) userProfile.ultimasRespostas.shift();
        return chosen;
    }

    function getStateText(stateKey) {
        const state = states[stateKey];
        if (!state) return states.start.texts[0];
        return getUniqueResponse(state.texts, userProfile.ultimasRespostas, stateKey);
    }

    function generateFreeResponse(userMessage) {
        const lower = userMessage.toLowerCase();
        let resposta;
        if (lower.includes("amor") || lower.includes("paixão")) {

    // ========== FUNÇÕES UI ==========
    function addMessage(text, sender, buttons = null) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message');
        msgDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');
        msgDiv.innerText = text;
        messagesDiv.appendChild(msgDiv);
        
        if (buttons && buttons.length > 0 && sender === 'bot') {
            const btnsDiv = document.createElement('div');
            btnsDiv.classList.add('buttons-container');
            buttons.forEach(btn => {
                const btnEl = document.createElement('button');
                btnEl.classList.add('choice-btn');
                btnEl.innerText = btn.label;
                btnEl.onclick = () => handleChoice(btn.next, btn.effect);
                btnsDiv.appendChild(btnEl);
            });
            messagesDiv.appendChild(btnsDiv);
        }
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function handleChoice(nextState, effect) {
        if (effect) {
            if (effect === "confiança") userProfile.vulnerabilidade = "confiante";
            else if (effect === "desejo") userProfile.interesse = "sedução";
            else if (effect === "magoa") userProfile.emocao = "triste";
        }
        currentState = nextState;
        showTyping();
        await new Promise(r => setTimeout(r, 600));
        hideTyping();
        const state = states[currentState];
        if (state) {
            const text = getStateText(currentState);
            addMessage(text, 'bot', state.buttons);
        } else {
            const fallbackText = getStateText("start");
            addMessage(fallbackText, 'bot', states.start.buttons);
            currentState = "start";
        }
    }

    async function sendFreeMessage(userText) {
        showTyping();
        await new Promise(r => setTimeout(r, 700));
        hideTyping();
        const reply = generateFreeResponse(userText);
        addMessage(reply, 'bot');
        // Botão para voltar ao modo com botões
        const btnsDiv = document.createElement('div');
        btnsDiv.classList.add('buttons-container');
        const backBtn = document.createElement('button');
        backBtn.classList.add('choice-btn');
        backBtn.innerText = "🔁 Voltar aos botões";
        backBtn.onclick = () => handleChoice("start", "reset");
        btnsDiv.appendChild(backBtn);
        messagesDiv.appendChild(btnsDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    let typingEl = null;
    function showTyping() {
        if (typingEl) hideTyping();
        typingEl = document.createElement('div');
        typingEl.classList.add('typing-indicator');
        typingEl.innerHTML = `Kell_negão está digitando <div class="typing-dots"><span>.</span><span>.</span><span>.</span></div>`;
        messagesDiv.appendChild(typingEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    function hideTyping() {
        if (typingEl) {
            typingEl.remove();
            typingEl = null;
        }
    }

    let isProcessing = false;
    async function sendUserMessage() {
        const text = inputField.value.trim();
        if (!text || isProcessing) return;
        isProcessing = true;
        sendButton.disabled = true;
        inputField.disabled = true;
        addMessage(text, 'user');
        conversationHistory.push({ role: "user", content: text });
        inputField.value = '';
        inputField.focus();
        
        if (currentState === "conversaLivre" || (states[currentState] && !states[currentState].buttons)) {
            await sendFreeMessage(text);
        } else {
            showTyping();
            await new Promise(r => setTimeout(r, 600));
            hideTyping();
            const reply = generateFreeResponse(text);
            addMessage(reply, 'bot');
            const btnsDiv = document.createElement('div');
            btnsDiv.classList.add('buttons-container');
            const backBtn = document.createElement('button');
            backBtn.classList.add('choice-btn');
            backBtn.innerText = "↩️ Voltar às opções";
            backBtn.onclick = () => handleChoice(currentState, null);
            btnsDiv.appendChild(backBtn);
            messagesDiv.appendChild(btnsDiv);
        }
        isProcessing = false;
        sendButton.disabled = false;
        inputField.disabled = false;
        inputField.focus();
    }

    function resetChat() {
        messagesDiv.innerHTML = '';
        conversationHistory = [];
        currentState = "start";
        userProfile = { nome: null, genero: "neutro", interesse: null, vulnerabilidade: null, ultimasRespostas: [] };
        const startText = getStateText("start");
        addMessage(startText, 'bot', states.start.buttons);
    }

    sendButton.addEventListener('click', sendUserMessage);
    resetButton.addEventListener('click', resetChat);
    inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !isProcessing) sendUserMessage();
    });

    // Inicialização
    const initialText = getStateText("start");
    addMessage(initialText, 'bot', states.start.buttons);
</script>
</body>
</html>
