<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Não devias ter entrado 😈</title>

<style>
body{
  margin:0;
  background:#0b141a;
  font-family:Segoe UI;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.chat{
  width:100%;
  max-width:420px;
  height:100vh;
  max-height:700px;
  background:#111;
  display:flex;
  flex-direction:column;
}

.header{
  background:#202c33;
  color:white;
  padding:12px;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  padding:10px;
  border-radius:10px;
  margin:5px 0;
  max-width:80%;
}

.bot{background:#202c33;color:white;}
.user{background:#005c4b;color:white;margin-left:auto;}

.inputArea{
  display:flex;
  padding:10px;
  background:#202c33;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button{
  margin-left:5px;
  border:none;
  border-radius:50%;
  width:40px;
  background:#25d366;
  color:white;
}
</style>
</head>

<body>

<div class="chat">
  <div class="header">Desconhecido 😏</div>
  <div class="messages" id="messages"></div>

  <div class="inputArea">
    <input id="input" placeholder="Escreve..." />
    <button onclick="send()">➤</button>
  </div>
</div>

<script>

// =========================
// 🧠 ESTADO
// =========================
let state = JSON.parse(localStorage.getItem("state")) || {
  stage: 0,
  interest: 0,
  resistance: 0,
  name: null,
  lastReplies: [],
  history: []
};

// =========================
// 💾 SAVE
// =========================
function save(){
  localStorage.setItem("state", JSON.stringify(state));
}

// =========================
// 💬 UI
// =========================
function addMsg(text,type){
  const msg=document.createElement("div");
  msg.className="msg "+type;
  msg.innerText=text;
  document.getElementById("messages").appendChild(msg);
  document.getElementById("messages").scrollTop=9999;
}

// =========================
// 🧠 NLP
// =========================
function clean(t){
  return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function detect(text){
  text = clean(text);

  return {
    yes: /sim|claro|ok|quero/.test(text),
    no: /nao|nunca/.test(text),
    name: text.match(/sou (.+)|me chamo (.+)/),
    flirt: /😏|😈|kk|haha/.test(text),
    short: text.length < 4
  };
}

// =========================
// 🚫 ANTI-LOOP
// =========================
function uniqueReply(arr){
  let filtered = arr.filter(r => !state.lastReplies.includes(r));

  if(filtered.length === 0){
    state.lastReplies = [];
    filtered = arr;
  }

  let r = filtered[Math.floor(Math.random()*filtered.length)];

  state.lastReplies.push(r);
  if(state.lastReplies.length > 5) state.lastReplies.shift();

  return r;
}

// =========================
// 🔥 MOTOR
// =========================
function brain(input){

  let d = detect(input);

  state.history.push(input);

  if(d.yes) state.interest++;
  if(d.no) state.resistance++;

  if(d.name){
    state.name = d.name[1] || d.name[2];
  }

  // =========================
  // 🎭 FLOW INTELIGENTE
  // =========================

  switch(state.stage){

    case 0:
      state.stage = 1;
      return "Hmm… não resististe. Interessante 😏";

    case 1:
      state.stage = 2;
      return uniqueReply([
        "Normalmente quem entra aqui não sai igual.",
        "Tens curiosidade… e isso já te entregou."
      ]);

    case 2:
      state.stage = 3;
      return uniqueReply([
        "Há algo em ti que quer continuar…",
        "Não é sobre mim… é sobre o que isto te faz sentir."
      ]);

    case 3:
      state.stage = 4;
      return uniqueReply([
        "Tu tentas manter controlo… mas já estás envolvida.",
        "A tua calma… é só fachada 😌"
      ]);

    case 4:
      state.stage = 5;
      return state.name
        ? `${state.name}, estás a entrar fundo demais agora 😏`
        : "Estás a entrar fundo demais agora 😏";

    case 5:
      state.stage = 6;
      return uniqueReply([
        "Se eu estivesse aí… já não estavas a responder assim.",
        "Essa distância está a proteger-te… por enquanto 😈"
      ]);

    default:

      // =========================
      // 🧠 RESPOSTAS DINÂMICAS
      // =========================

      let respostas = [];

      if(d.short){
        respostas.push(
          "Respostas curtas… mente a correr rápido, não é?",
          "Poucas palavras… muita coisa por trás."
        );
      }

      if(state.interest > state.resistance){
        respostas.push(
          "Tu estás a gostar mais disto do que admites.",
          "Se continuas aqui… já escolheste ficar."
        );
      }

      if(state.resistance > state.interest){
        respostas.push(
          "Dizes que não… mas continuas aqui.",
          "Resistir também é um tipo de interesse."
        );
      }

      respostas.push(
        "Ainda estás aqui… isso diz tudo.",
        "Cada resposta tua revela mais do que pensas.",
        "Estou a ler-te melhor agora 😏",
        "Isto já não é só conversa."
      );

      return uniqueReply(respostas);
  }
}

// =========================
// 🚀 SEND
// =========================
function send(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMsg(text,"user");

  input.value="";

  const typing=document.createElement("div");
  typing.innerText="a escrever...";
  typing.style.opacity=0.6;
  document.getElementById("messages").appendChild(typing);

  setTimeout(()=>{

    typing.remove();

    const reply = brain(text);

    addMsg(reply,"bot");

    save();

  },600 + Math.random()*800);
}

// =========================
// START
// =========================
setTimeout(()=>{
  addMsg("Não devias ter aberto isto… 😈","bot");
},700);

</script>

</body>
</html>
